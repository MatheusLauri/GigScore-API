version: '3.8'

services:
  # Mock Server para simular as APIs externas (iFood, Uber, Contas)
  wiremock:
    image: wiremock/wiremock:latest
    container_name: gigscore-wiremock
    ports:
      - "8081:8080"
    command: ["--global-response-templating", "--disable-banner"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings

  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: gigscore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gigscore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Zookeeper (Gerenciador do cluster Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: gigscore-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Broker do Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: gigscore-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Interface Gráfica para o Kafka (Kafka UI)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gigscore-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  postgres-data:
